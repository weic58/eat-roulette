<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff7a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="吃什麼" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>到底要吃什麼?</title>

  <!-- iOS 網頁 App 圖示 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='42' fill='%23ff7a18'/%3E%3Ccircle cx='90' cy='90' r='58' fill='%23fff4e8'/%3E%3Ctext x='90' y='110' font-size='82' text-anchor='middle'%3E%F0%9F%8D%BD%EF%B8%8F%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --bg: #fff7ed;
      --card: rgba(255, 255, 255, .88);
      --text: #2b1b12;
      --muted: #8c6b5a;
      --main: #ff7a18;
      --main2: #ffb703;
      --danger: #ef4444;
      --shadow: 0 18px 45px rgba(153, 78, 19, .16);
      --radius: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffe0b2 0 18%, transparent 28%),
        radial-gradient(circle at 90% 15%, #ffd166 0 14%, transparent 26%),
        linear-gradient(135deg, #fff7ed, #fff1d6 50%, #ffe4cc);
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 66px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(14px);
      background: rgba(255, 247, 237, .78);
      border-bottom: 1px solid rgba(255, 122, 24, .15);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 950;
      font-size: 22px;
      letter-spacing: -0.5px;
      cursor: pointer;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--main), var(--main2));
      box-shadow: 0 10px 24px rgba(255, 122, 24, .28);
      color: white;
      font-size: 24px;
    }

    .icon-btn, .btn {
      border: 0;
      cursor: pointer;
      font-weight: 850;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .icon-btn:active, .btn:active { transform: scale(.96); }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 20px rgba(88, 46, 12, .1);
      font-size: 22px;
    }

    main {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 16px 34px;
    }

    .view { display: none; animation: fade .22s ease both; }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .hero {
      text-align: center;
      padding: 24px 14px 12px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1.08;
      letter-spacing: -1.5px;
    }
    .hero p {
      margin: 12px auto 0;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.7;
      font-weight: 650;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 22px;
    }
    @media (max-width: 760px) { .mode-grid { grid-template-columns: 1fr; } }

    .mode-card, .panel {
      background: var(--card);
      border: 1px solid rgba(255, 122, 24, .18);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .mode-card {
      position: relative;
      overflow: hidden;
      padding: 22px;
      min-height: 180px;
      text-align: left;
      cursor: pointer;
    }
    .mode-card::after {
      content: "";
      position: absolute;
      inset: auto -40px -55px auto;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255,122,24,.18), transparent 68%);
      border-radius: 50%;
    }
    .mode-card:hover { transform: translateY(-3px); }
    .mode-emoji { font-size: 46px; display: block; margin-bottom: 14px; }
    .mode-card h2 { margin: 0 0 8px; font-size: 24px; }
    .mode-card p { margin: 0; color: var(--muted); font-weight: 650; line-height: 1.55; }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .back-btn {
      background: white;
      color: var(--text);
      border: 1px solid rgba(255, 122, 24, .2);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 8px 18px rgba(88, 46, 12, .08);
    }
    .view-title { margin: 0; font-size: clamp(24px, 5vw, 34px); }

    .wheel-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      align-items: start;
    }
    @media (max-width: 860px) { .wheel-layout { grid-template-columns: 1fr; } }

    .wheel-panel {
      padding: 18px;
      text-align: center;
    }

    .wheel-wrap {
      position: relative;
      width: min(78vw, 520px);
      aspect-ratio: 1;
      margin: 8px auto 18px;
      display: grid;
      place-items: center;
    }

    canvas#wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      filter: drop-shadow(0 22px 30px rgba(105, 52, 5, .24));
      transition: transform 4.2s cubic-bezier(.12, .78, .08, 1);
    }

    .pointer {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 42px solid #2b1b12;
      z-index: 6;
      filter: drop-shadow(0 5px 4px rgba(0,0,0,.18));
    }

    .center-cap {
      position: absolute;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: white;
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 950;
      box-shadow: inset 0 0 0 8px rgba(255,122,24,.15), 0 10px 20px rgba(0,0,0,.12);
      z-index: 5;
    }

    .spin-btn {
      width: min(360px, 100%);
      padding: 16px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--main), #ff4d00);
      color: white;
      font-size: 20px;
      box-shadow: 0 16px 30px rgba(255, 93, 11, .28);
    }
    .spin-btn:disabled { opacity: .65; cursor: not-allowed; }

    .result-box {
      margin: 14px auto 0;
      min-height: 62px;
      width: min(460px, 100%);
      border-radius: 20px;
      padding: 14px 16px;
      background: #fff;
      border: 2px dashed rgba(255,122,24,.38);
      color: var(--muted);
      font-weight: 850;
      display: grid;
      place-items: center;
    }
    .result-box strong { color: var(--main); font-size: 28px; }

    .filter-panel {
      width: min(520px, 100%);
      margin: 0 auto 14px;
      padding: 12px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(255,122,24,.18);
      border-radius: 20px;
      text-align: left;
    }
    .filter-title { font-weight: 950; margin-bottom: 8px; color: #7c4a2e; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .filter-chip {
      border: 1px solid rgba(255,122,24,.22);
      background: white;
      color: #7c4a2e;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .filter-chip.active { background: #2b1b12; color: white; }
    .filter-note { color: var(--muted); font-size: 13px; font-weight: 750; }
    .item-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff7ed;
      color: #8c4b22;
      border: 1px solid rgba(255,122,24,.16);
      font-size: 12px;
      font-weight: 900;
    }
    .setting-grid {
      display: grid;
      grid-template-columns: 1fr 120px 100px auto;
      gap: 8px;
      margin-bottom: 12px;
    }
    .setting-grid input, .setting-grid select {
      min-width: 0;
      border: 1px solid rgba(255,122,24,.25);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      background: white;
    }
    @media (max-width: 680px) { .setting-grid { grid-template-columns: 1fr; } }


    .csv-tools { padding: 18px; margin-bottom: 16px; }
    .csv-tools h2 { margin: 0 0 8px; font-size: 22px; }
    .csv-tools p { margin: 0 0 12px; color: var(--muted); font-weight: 750; line-height: 1.6; }
    .csv-grid {
      display: grid;
      grid-template-columns: 160px 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .csv-grid select, .csv-grid input[type="file"] {
      min-width: 0;
      border: 1px solid rgba(255,122,24,.25);
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
      background: white;
      font-weight: 800;
    }
    .csv-grid input[type="file"] { color: #7c4a2e; }
    .csv-template {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fff7ed;
      color: #8c4b22;
      border: 1px solid rgba(255,122,24,.14);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.6;
    }
    @media (max-width: 760px) { .csv-grid { grid-template-columns: 1fr; } }

    .side-panel { padding: 18px; }
    .side-panel h3 { margin: 0 0 10px; font-size: 20px; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: #fff7ed;
      border: 1px solid rgba(255,122,24,.18);
      color: #7c4a2e;
      font-weight: 800;
      font-size: 14px;
    }

    .setting-section { padding: 18px; margin-bottom: 16px; }
    .setting-section h2 { margin: 0 0 12px; font-size: 22px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .input-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255,122,24,.25);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      background: white;
    }
    .small-btn {
      border-radius: 16px;
      padding: 0 16px;
      background: #2b1b12;
      color: white;
      white-space: nowrap;
    }
    .item-list { display: grid; gap: 8px; }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: white;
      border: 1px solid rgba(255,122,24,.16);
      border-radius: 16px;
      padding: 10px 12px;
      font-weight: 800;
    }
    .item-actions { display: flex; gap: 6px; }
    .mini {
      border: 0;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 900;
      cursor: pointer;
      background: #fff1d6;
    }
    .mini.delete { background: #fee2e2; color: #b91c1c; }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 16px;
      border-radius: 999px;
      background: #2b1b12;
      color: white;
      font-weight: 850;
      z-index: 40;
      transition: .22s ease;
      box-shadow: 0 12px 25px rgba(0,0,0,.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="navigate('home')">
      <div class="brand-icon">🍽️</div>
      <span>到底要吃什麼?</span>
    </div>
    <button class="icon-btn" onclick="navigate('settings')" title="設定">⚙️</button>
  </header>

  <main>
    <section id="view-home" class="view active">
      <div class="hero">
        <h1>今天吃什麼，<br>交給轉盤決定！</h1>
        <p>選一個模式，按下開始，讓彩色大轉盤幫你終結選擇困難。</p>
      </div>

      <div class="mode-grid">
        <button class="mode-card" onclick="openMode('cuisine')">
          <span class="mode-emoji">🍝</span>
          <h2>料理種類</h2>
          <p>義式、日式、美式、韓式、台式，先決定大方向。</p>
        </button>
        <button class="mode-card" onclick="openMode('restaurant')">
          <span class="mode-emoji">🏪</span>
          <h2>隨機餐廳</h2>
          <p>把常吃店家加進去，直接抽今天要去哪一間。</p>
        </button>
        <button class="mode-card" onclick="openMode('item')">
          <span class="mode-emoji">🍜</span>
          <h2>隨機品項</h2>
          <p>便當、拉麵、牛排、滷味，連品項也一起決定。</p>
        </button>
      </div>
    </section>

    <section id="view-wheel" class="view">
      <div class="top-row">
        <button class="btn back-btn" onclick="navigate('home')">← 回首頁</button>
        <h1 id="wheelTitle" class="view-title">轉盤</h1>
        <button class="btn back-btn" onclick="navigate('settings')">管理</button>
      </div>

      <div class="wheel-layout">
        <div class="panel wheel-panel">
          <div id="restaurantFilters" class="filter-panel" style="display:none;"></div>
          <div class="wheel-wrap">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="900" height="900"></canvas>
            <div class="center-cap">🍽️</div>
          </div>
          <button id="spinBtn" class="btn spin-btn" onclick="spinWheel()">開始轉！</button>
          <div id="resultBox" class="result-box">按下按鈕，讓轉盤幫你選。</div>
        </div>

        <aside class="panel side-panel">
          <h3>目前選項</h3>
          <div id="optionChips" class="chip-list"></div>
        </aside>
      </div>
    </section>

    <section id="view-settings" class="view">
      <div class="top-row">
        <button class="btn back-btn" onclick="navigate('home')">← 回首頁</button>
        <h1 class="view-title">設定選項</h1>
        <button class="btn back-btn" onclick="resetDefaultData()">重設</button>
      </div>

      <div class="panel csv-tools">
        <h2>📥 CSV 匯入 / 匯出</h2>
        <p>先選擇要管理的資料類別，再匯入或匯出 CSV。匯出的檔案會自動加入 UTF-8 BOM，Excel 開啟中文比較不會亂碼。</p>
        <div class="csv-grid">
          <select id="csvCategory" onchange="updateCsvHint()">
            <option value="cuisine">料理種類</option>
            <option value="restaurant">餐廳</option>
            <option value="item">品項</option>
          </select>
          <input id="csvFile" type="file" accept=".csv,text/csv" />
          <button class="btn small-btn" onclick="importCSV()">匯入 CSV</button>
          <button class="btn small-btn" onclick="exportCSV()">匯出 CSV</button>
        </div>
        <div id="csvHint" class="csv-template"></div>
      </div>

      <div id="settingsContainer"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const STORE_KEY = 'eatRouletteData.v2';

    const modeInfo = {

    const defaultData = {
      cuisine: ['義式料理', '日式料理', '美式料理', '韓式料理', '台式料理', '港式料理', '泰式料理', '火鍋'],

    const restaurantTypes = ['全部', '飲料店', '甜點店', '咖啡廳', '餐廳'];
    const priceLevels = ['全部', '$', '$$', '$$$'];
    let restaurantFilter = { type: '全部', price: '全部' };

    let data = loadData();
    let currentMode = 'cuisine';
    let currentRotation = 0;
    let spinning = false;

    const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff924c', '#52b788', '#f72585', '#4cc9f0', '#b5179e', '#f77f00', '#43aa8b'];

    function normalizeRestaurant(item) {
      if (typeof item === 'string') return { name: item, type: '餐廳', price: '$$' };
      return {
        name: item.name || item.title || '未命名',
        type: restaurantTypes.includes(item.type) && item.type !== '全部' ? item.type : '餐廳',
        price: priceLevels.includes(item.price) && item.price !== '全部' ? item.price : '$$'
      };
    }

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY));
        if (!saved) return structuredClone(defaultData);
        return {
          cuisine: Array.isArray(saved.cuisine) ? saved.cuisine : [...defaultData.cuisine],
          restaurant: Array.isArray(saved.restaurant) ? saved.restaurant.map(normalizeRestaurant) : structuredClone(defaultRestaurants),
          item: Array.isArray(saved.item) ? saved.item : [...defaultData.item]
        };
      } catch (e) {
        return structuredClone(defaultData);
      }
    }

    function saveData() {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    function navigate(view) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(`view-${view}`).classList.add('active');
      if (view === 'settings') { renderSettings(); updateCsvHint(); }
      if (view === 'wheel') renderWheelPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openMode(mode) {
      currentMode = mode;
      currentRotation = 0;
      document.getElementById('wheelCanvas').style.transition = 'none';
      document.getElementById('wheelCanvas').style.transform = 'rotate(0deg)';
      document.getElementById('resultBox').innerHTML = '按下按鈕，讓轉盤幫你選。';
      navigate('wheel');
    }

    function getCurrentItems() {
      if (currentMode !== 'restaurant') return data[currentMode];
      return data.restaurant.filter(item => {
        const typeOk = restaurantFilter.type === '全部' || item.type === restaurantFilter.type;
        const priceOk = restaurantFilter.price === '全部' || item.price === restaurantFilter.price;
        return typeOk && priceOk;
      });
    }

    function getItemName(item) {
      return typeof item === 'string' ? item : item.name;
    }

    function renderWheelPage() {
      const info = modeInfo[currentMode];
      document.getElementById('wheelTitle').textContent = `${info.icon} ${info.title}`;
      renderRestaurantFilters();
      renderChips();
      drawWheel();
    }

    function renderRestaurantFilters() {
      const box = document.getElementById('restaurantFilters');
      if (currentMode !== 'restaurant') {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }
      box.style.display = 'block';
      box.innerHTML = `
        <div class="filter-title">🔎 篩選餐廳</div>
        <div class="filter-row">
          ${restaurantTypes.map(t => `<button class="filter-chip ${restaurantFilter.type === t ? 'active' : ''}" onclick="setRestaurantFilter('type', '${t}')">${t}</button>`).join('')}
        </div>
        <div class="filter-row">
          ${priceLevels.map(p => `<button class="filter-chip ${restaurantFilter.price === p ? 'active' : ''}" onclick="setRestaurantFilter('price', '${p}')">${p === '全部' ? '全部價位' : p}</button>`).join('')}
        </div>
        <div class="filter-note">$ 平價｜$$ 中價位｜$$$ 較高價位；非餐廳類也可用價位一起篩選。</div>
      `;
    }

    function setRestaurantFilter(kind, value) {
      restaurantFilter[kind] = value;
      document.getElementById('resultBox').innerHTML = '按下按鈕，讓轉盤幫你選。';
      renderWheelPage();
    }

    function renderChips() {
      const chips = document.getElementById('optionChips');
      const items = getCurrentItems();
      if (!items.length) {
        chips.innerHTML = `<div class="empty">目前沒有符合篩選的選項，請調整篩選或到設定新增。</div>`;
        return;
      }
      chips.innerHTML = items.map(item => {
        if (currentMode === 'restaurant') return `<span class="chip">${escapeHtml(item.name)}｜${escapeHtml(item.type)}｜${escapeHtml(item.price)}</span>`;
        return `<span class="chip">${escapeHtml(item)}</span>`;
      }).join('');
    }

    function drawWheel() {
      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const items = getCurrentItems();
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(cx, cy) - 18;
      ctx.clearRect(0, 0, w, h);

      if (!items.length) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.fillStyle = '#8c6b5a';
        ctx.font = 'bold 44px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('請先新增選項', cx, cy);
        return;
      }

      const angle = Math.PI * 2 / items.length;
      const startOffset = -Math.PI / 2;

      items.forEach((item, i) => {
        const start = startOffset + i * angle;
        const end = start + angle;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,.9)';
        ctx.lineWidth = 5;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + angle / 2);
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.font = `900 ${items.length > 10 ? 26 : 34}px sans-serif`;
        ctx.shadowColor = 'rgba(0,0,0,.3)';
        ctx.shadowBlur = 4;
        wrapText(ctx, getItemName(item), r - 42, 0, Math.min(210, r * .48), items.length > 10 ? 30 : 38);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(43, 27, 18, .18)';
      ctx.lineWidth = 14;
      ctx.stroke();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = String(text).split('');
      let line = '';
      const lines = [];
      chars.forEach(ch => {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      });
      lines.push(line);
      const startY = y - (lines.length - 1) * lineHeight / 2;
      lines.slice(0, 2).forEach((ln, idx) => ctx.fillText(ln, x, startY + idx * lineHeight));
    }

    function spinWheel() {
      const items = getCurrentItems();
      if (!items.length) {
        toast('目前沒有符合篩選的選項');
        return;
      }
      if (spinning) return;
      spinning = true;

      const btn = document.getElementById('spinBtn');
      const canvas = document.getElementById('wheelCanvas');
      const resultBox = document.getElementById('resultBox');
      btn.disabled = true;
      resultBox.innerHTML = '轉盤旋轉中...';

      const targetIndex = Math.floor(Math.random() * items.length);
      const slice = 360 / items.length;
      const centerAngle = targetIndex * slice + slice / 2;
      const extraTurns = 6 + Math.floor(Math.random() * 3);
      const targetRotation = extraTurns * 360 + (360 - centerAngle);

      currentRotation += targetRotation;
      canvas.style.transition = 'transform 4.2s cubic-bezier(.12, .78, .08, 1)';
      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        spinning = false;
        btn.disabled = false;
        const picked = items[targetIndex];
        const pickedName = getItemName(picked);
        const meta = currentMode === 'restaurant' ? `<div style="font-size:14px;color:var(--muted);margin-top:4px;">${escapeHtml(picked.type)}｜${escapeHtml(picked.price)}</div>` : '';
        resultBox.innerHTML = `今天就吃：<br><strong>${escapeHtml(pickedName)}</strong>${meta}`;
      }, 4300);
    }

    function csvCategoryLabel(key) {
      return modeInfo[key] ? modeInfo[key].label : key;
    }

    function updateCsvHint() {
      const select = document.getElementById('csvCategory');
      const hint = document.getElementById('csvHint');
      if (!select || !hint) return;
      const key = select.value;
      if (key === 'restaurant') {
        hint.innerHTML = '餐廳 CSV 格式：<b>名稱,類型,價位</b><br>類型可填：飲料店、甜點店、咖啡廳、餐廳；價位可填：$、$$、$$$。';
      } else {
        hint.innerHTML = `${escapeHtml(csvCategoryLabel(key))} CSV 格式：<b>名稱</b><br>例如每列一個選項，重複名稱會自動略過。`;
      }
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;
      text = String(text || '').replace(/^\uFEFF/, '');

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          row.push(cell.trim());
          cell = '';
        } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(cell.trim());
          if (row.some(v => v !== '')) rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += ch;
        }
      }
      row.push(cell.trim());
      if (row.some(v => v !== '')) rows.push(row);
      return rows;
    }

    function toCSVValue(value) {
      const text = String(value || '');
      return `"${text.replace(/"/g, '""')}"`;
    }

    function importCSV() {
      const key = document.getElementById('csvCategory').value;
      const fileInput = document.getElementById('csvFile');
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        toast('請先選擇 CSV 檔案');
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        const rows = parseCSV(e.target.result);
        if (!rows.length) {
          toast('CSV 沒有資料');
          return;
        }

        const headerWords = ['名稱', 'name', '餐廳', '料理種類', '品項', '類型', 'type', '價位', 'price'];
        const first = rows[0].map(v => v.replace(/^\uFEFF/, '').trim().toLowerCase());
        const hasHeader = first.some(v => headerWords.includes(v));
        const bodyRows = hasHeader ? rows.slice(1) : rows;
        let added = 0;
        let skipped = 0;

        if (key === 'restaurant') {
          bodyRows.forEach(cols => {
            const name = (cols[0] || '').trim();
            if (!name) return;
            const typeRaw = (cols[1] || '餐廳').trim();
            const priceRaw = (cols[2] || '$$').trim();
            const type = restaurantTypes.includes(typeRaw) && typeRaw !== '全部' ? typeRaw : '餐廳';
            const price = priceLevels.includes(priceRaw) && priceRaw !== '全部' ? priceRaw : '$$';
            if (data.restaurant.some(item => item.name === name)) {
              skipped++;
              return;
            }
            data.restaurant.push({ name, type, price });
            added++;
          });
        } else {
          bodyRows.forEach(cols => {
            const name = (cols[0] || '').trim();
            if (!name) return;
            if (data[key].includes(name)) {
              skipped++;
              return;
            }
            data[key].push(name);
            added++;
          });
        }

        saveData();
        renderSettings();
        updateCsvHint();
        fileInput.value = '';
        toast(`匯入完成：新增 ${added} 筆，略過 ${skipped} 筆`);
      };
      reader.readAsText(file, 'utf-8');
    }

    function exportCSV() {
      const key = document.getElementById('csvCategory').value;
      let csv = '\uFEFF';
      if (key === 'restaurant') {
        csv += '名稱,類型,價位\n';
        data.restaurant.forEach(item => {
          csv += [toCSVValue(item.name), toCSVValue(item.type), toCSVValue(item.price)].join(',') + '\n';
        });
      } else {
        csv += '名稱\n';
        data[key].forEach(item => {
          csv += toCSVValue(item) + '\n';
        });
      }

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      a.href = url;
      a.download = `到底要吃什麼_${csvCategoryLabel(key)}_${date}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('CSV 已匯出');
    }

    function renderSettings() {
      const container = document.getElementById('settingsContainer');
      container.innerHTML = Object.keys(modeInfo).map(key => {
        const info = modeInfo[key];
        const items = data[key];
        const addBlock = key === 'restaurant'
          ? `<div class="setting-grid">
              <input id="input-${key}" type="text" placeholder="新增餐廳，例如：巷口牛肉麵" onkeydown="if(event.key==='Enter') addItem('${key}')" />
              <select id="type-${key}">${restaurantTypes.filter(t => t !== '全部').map(t => `<option value="${t}">${t}</option>`).join('')}</select>
              <select id="price-${key}">${priceLevels.filter(p => p !== '全部').map(p => `<option value="${p}">${p}</option>`).join('')}</select>
              <button class="btn small-btn" onclick="addItem('${key}')">新增</button>
            </div>`
          : `<div class="input-row">
              <input id="input-${key}" type="text" placeholder="新增${info.label}，例如：${placeholderFor(key)}" onkeydown="if(event.key==='Enter') addItem('${key}')" />
              <button class="btn small-btn" onclick="addItem('${key}')">新增</button>
            </div>`;
        const listHtml = items.length ? items.map((item, idx) => {
          const title = key === 'restaurant' ? item.name : item;
          const meta = key === 'restaurant' ? `<div class="item-meta"><span class="tag">${escapeHtml(item.type)}</span><span class="tag">${escapeHtml(item.price)}</span></div>` : '';
          return `<div class="item">
            <span><b>${escapeHtml(title)}</b>${meta}</span>
            <div class="item-actions">
              <button class="mini" onclick="editItem('${key}', ${idx})">改</button>
              <button class="mini delete" onclick="deleteItem('${key}', ${idx})">刪</button>
            </div>
          </div>`;
        }).join('') : '<div class="empty">尚無選項</div>';
        return `
          <div class="panel setting-section">
            <h2>${info.icon} 管理${info.label}</h2>
            ${addBlock}
            <div class="item-list">${listHtml}</div>
          </div>
        `;
      }).join('');
    }

    function placeholderFor(key) {
      if (key === 'cuisine') return '墨西哥料理';
      if (key === 'restaurant') return '巷口牛肉麵';
      return '雞腿便當';
    }

    function addItem(key) {
      const input = document.getElementById(`input-${key}`);
      const value = input.value.trim();
      if (!value) return;

      if (key === 'restaurant') {
        if (data.restaurant.some(item => item.name === value)) {
          toast('這個選項已經存在');
          return;
        }
        data.restaurant.push({
          name: value,
          type: document.getElementById(`type-${key}`).value,
          price: document.getElementById(`price-${key}`).value
        });
      } else {
        if (data[key].includes(value)) {
          toast('這個選項已經存在');
          return;
        }
        data[key].push(value);
      }
      input.value = '';
      saveData();
      renderSettings();
      toast('已新增');
    }

    function editItem(key, idx) {
      if (key === 'restaurant') {
        const item = data.restaurant[idx];
        const nextName = prompt('修改店名：', item.name);
        if (nextName === null) return;
        const name = nextName.trim();
        if (!name) return;
        const nextType = prompt('修改類型：飲料店 / 甜點店 / 咖啡廳 / 餐廳', item.type);
        if (nextType === null) return;
        const type = restaurantTypes.includes(nextType.trim()) && nextType.trim() !== '全部' ? nextType.trim() : item.type;
        const nextPrice = prompt('修改價位：$ / $$ / $$$', item.price);
        if (nextPrice === null) return;
        const price = priceLevels.includes(nextPrice.trim()) && nextPrice.trim() !== '全部' ? nextPrice.trim() : item.price;
        data.restaurant[idx] = { name, type, price };
      } else {
        const next = prompt('修改選項名稱：', data[key][idx]);
        if (next === null) return;
        const value = next.trim();
        if (!value) return;
        data[key][idx] = value;
      }
      saveData();
      renderSettings();
      toast('已修改');
    }

    function deleteItem(key, idx) {
      const itemName = key === 'restaurant' ? data.restaurant[idx].name : data[key][idx];
      if (!confirm(`確定刪除「${itemName}」嗎？`)) return;
      data[key].splice(idx, 1);
      saveData();
      renderSettings();
      toast('已刪除');
    }

    function resetDefaultData() {
      if (!confirm('確定要恢復預設資料嗎？目前自訂選項會被覆蓋。')) return;
      data = structuredClone(defaultData);
      saveData();
      renderSettings();
      toast('已恢復預設');
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]));
    }

    // 初始繪製，避免某些瀏覽器第一次進轉盤時 canvas 為空
    drawWheel();
  </script>
</body>
</html>
